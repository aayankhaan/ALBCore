# ─────────────────────────────────────────
# Undead Slayer Effect
# ─────────────────────────────────────────
# Deals bonus damage to undead mobs.
# Level scales damage: 8 * level with 1.3x multiplier.

trigger: ON_ATTACK
max-level: 3
cooldown: 1500
chance: 100

display-name: "<red>Undead Slayer {level}"
description:
  - "<gray>Deals bonus damage to undead mobs"
  - "<gray>Damage: <white>+{level}x boost"

# Only works on swords
applicable-items:
  - DIAMOND_SWORD
  - NETHERITE_SWORD
  - IRON_SWORD
  - GOLDEN_SWORD
  - STONE_SWORD
  - WOODEN_SWORD

conditions:
  mob-type:
    - ZOMBIE
    - SKELETON
    - WITHER_SKELETON
    - ZOMBIFIED_PIGLIN
    - DROWNED
    - HUSK
    - STRAY
    - PHANTOM

actions:
  - type: DAMAGE_BOOST
    damage: "8 * level"
    multiplier: 1.3
  - type: PARTICLE
    particle: SOUL_FIRE_FLAME
    count: 15
    offset-x: 0.3
    offset-y: 0.5
    offset-z: 0.3
    speed: 0.05
  - type: SOUND
    sound: ENTITY_WITHER_SKELETON_DEATH
    volume: 0.5
    pitch: 1.2